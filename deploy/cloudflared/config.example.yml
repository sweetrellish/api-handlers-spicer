# Named tunnel example (stable URL)
# 1) cloudflared tunnel login
# 2) cloudflared tunnel create spicer-webhook
# 3) copy generated tunnel UUID below
# 4) cloudflared tunnel route dns spicer-webhook webhook.yourdomain.com
# 5) cloudflared tunnel run spicer-webhook

tunnel: REPLACE_WITH_TUNNEL_UUID
credentials-file: /Users/ryanellis/.cloudflared/REPLACE_WITH_TUNNEL_UUID.json

ingress:
  - hostname: webhook.yourdomain.com
    service: http://localhost:5001
  - service: http_status:404
